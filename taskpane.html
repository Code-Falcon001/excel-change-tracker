<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Tracker v5.0</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        .button {
            background-color: #0078D4;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #005a9e;
        }
    </style>
</head>
<body>
    <h1>Change Tracker v5.0</h1>
    <button class="button" onclick="startTracking()">Start Tracking</button>
    <button class="button" onclick="stopTracking()">Stop Tracking</button>
    <div id="log"></div>
    <script>
        let isTracking = false;
        const changes = [];

        function startTracking() {
            isTracking = true;
            changes.length = 0;
            log('Change tracking started.');
        }

        function stopTracking() {
            isTracking = false;
            log('Change tracking stopped.');
            displayChanges();
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += message + '<br>';
        }

        function displayChanges() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += '<h2>Changes:</h2>';
            changes.forEach(change => {
                logDiv.innerHTML += `<div>${change}</div>`;
            });
        }

        // Example function that could track changes (needs real implementation)
        function trackChange(change) {
            if (isTracking) {
                changes.push(change);
                log(`Change detected: ${change}`);
            }
        }
    </script>
</body>
</html>
